<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Ambient Background -->
    <div class="ambient-background"></div>

    <!-- Main Calculator UI -->
    <div class="calculator">
        <div class="display">
            <div class="previous-operand" id="previous-operand"></div>
            <div class="current-operand" id="current-operand">0</div>
        </div>

        <!-- CSS Grid Layout for Keys -->
        <div class="keypad">
            <button class="key action clear" data-action="clear">AC</button>
            <button class="key action" data-action="delete">DEL</button>
            <button class="key operator" data-action="divide">÷</button>

            <button class="key number" data-number="7">7</button>
            <button class="key number" data-number="8">8</button>
            <button class="key number" data-number="9">9</button>
            <button class="key operator" data-action="multiply">×</button>

            <button class="key number" data-number="4">4</button>
            <button class="key number" data-number="5">5</button>
            <button class="key number" data-number="6">6</button>
            <button class="key operator" data-action="subtract">−</button>

            <button class="key number" data-number="1">1</button>
            <button class="key number" data-number="2">2</button>
            <button class="key number" data-number="3">3</button>
            <button class="key operator" data-action="add">+</button>

            <button class="key number zero" data-number="0">0</button>
            <button class="key number" data-number=".">.</button>
            <button class="key operator equals" data-action="calculate">=</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
